<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Background gradient: deep navy to slate -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1c2f45"/>
    </linearGradient>

    <!-- Accent glow for the "5" -->
    <radialGradient id="numGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b9eff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#3b9eff;stop-opacity:0"/>
    </radialGradient>

    <!-- Folder gradient -->
    <linearGradient id="folderBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="folderTab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81d4fa"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="folderShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="213" y1="0" x2="213" y2="720"/>
    <line x1="426" y1="0" x2="426" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="853" y1="0" x2="853" y2="720"/>
    <line x1="1066" y1="0" x2="1066" y2="720"/>
  </g>

  <!-- Blue glow behind the "5" -->
  <ellipse cx="225" cy="340" rx="220" ry="220" fill="url(#numGlow)"/>

  <!-- Left accent bar -->
  <rect x="44" y="80" width="7" height="560" rx="4" fill="#3b9eff" opacity="0.8"/>

  <!-- BIG "5" -->
  <text x="80" y="490"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
        font-size="420"
        font-weight="900"
        fill="#3b9eff"
        filter="url(#glowFilter)"
        opacity="0.18"
        letter-spacing="-10">5</text>

  <text x="72" y="478"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
        font-size="380"
        font-weight="900"
        fill="#ffffff"
        filter="url(#textShadow)"
        letter-spacing="-10">5</text>

  <!-- "WAYS" label next to 5 -->
  <text x="288" y="290"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
        font-size="88"
        font-weight="900"
        fill="#3b9eff"
        filter="url(#textShadow)"
        letter-spacing="8">WAYS</text>

  <!-- Divider line under WAYS -->
  <rect x="290" y="306" width="320" height="5" rx="2" fill="#3b9eff" opacity="0.6"/>

  <!-- "TO CREATE A" -->
  <text x="290" y="395"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="52"
        font-weight="700"
        fill="#cde8ff"
        filter="url(#textShadow)"
        letter-spacing="2">TO CREATE A</text>

  <!-- "NEW FOLDER" — big bold line -->
  <text x="286" y="490"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
        font-size="106"
        font-weight="900"
        fill="#ffffff"
        filter="url(#textShadow)"
        letter-spacing="-2">NEW FOLDER</text>

  <!-- "ON macOS" -->
  <text x="290" y="572"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="62"
        font-weight="800"
        fill="#3b9eff"
        filter="url(#textShadow)"
        letter-spacing="1">ON macOS</text>

  <!-- ===================== FOLDER ICON (right side) ===================== -->
  <g transform="translate(820, 130)" filter="url(#shadow)">
    <!-- Tab (top-left of folder) -->
    <path d="M0,60 Q0,30 30,30 L160,30 Q185,30 200,55 L220,80 L560,80 Q590,80 590,110 L590,430 Q590,460 560,460 L30,460 Q0,460 0,430 Z"
          fill="url(#folderBody)"/>
    <!-- Tab top piece -->
    <path d="M0,60 Q0,30 30,30 L160,30 Q185,30 200,55 L220,80 L0,80 Z"
          fill="url(#folderTab)"/>
    <!-- Shine overlay -->
    <path d="M30,80 L560,80 Q590,80 590,110 L590,230 Q300,290 0,230 L0,110 Q0,80 30,80 Z"
          fill="url(#folderShine)" rx="4"/>

    <!-- Finder-style dots (bottom of folder face) -->
    <circle cx="295" cy="400" r="9" fill="#ffffff" opacity="0.25"/>
    <circle cx="265" cy="400" r="9" fill="#ffffff" opacity="0.15"/>
    <circle cx="325" cy="400" r="9" fill="#ffffff" opacity="0.15"/>

    <!-- Plus (+) symbol inside folder -->
    <rect x="265" y="225" width="60" height="14" rx="7" fill="#ffffff" opacity="0.9"/>
    <rect x="288" y="202" width="14" height="60" rx="7" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- ===================== BADGES ===================== -->

  <!-- "Beginner Friendly" pill badge -->
  <rect x="288" y="618" width="310" height="52" rx="26" fill="#16a34a" opacity="0.92" filter="url(#shadow)"/>
  <text x="443" y="651"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="26"
        font-weight="800"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="1">✓  BEGINNER FRIENDLY</text>

  <!-- "2026" year badge -->
  <rect x="622" y="618" width="150" height="52" rx="26" fill="#3b9eff" opacity="0.92" filter="url(#shadow)"/>
  <text x="697" y="651"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="28"
        font-weight="900"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="2">2026</text>

  <!-- Top-right subtle macOS logo placeholder (Apple-inspired circles) -->
  <g transform="translate(1170, 58)" opacity="0.18">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff"/>
  </g>

</svg>
